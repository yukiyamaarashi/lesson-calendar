<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <title>マイスケジュールカレンダー</title>
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <style>
    :root {
      --bg: #f7f7f8;
      --fg: #222;
      --accent: #3b6ea8;
      --accent-soft: #e1ecf7;
      --border: #ddd;
      --today: #fff3c4;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background: var(--bg);
      color: var(--fg);
      display: flex;
      justify-content: center;
      padding: 12px;
    }
    .app {
      width: 100%;
      max-width: 900px;
      background: #fff;
      border-radius: 10px;
      box-shadow: 0 4px 16px rgba(0,0,0,0.06);
      padding: 16px;
    }
    header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 8px;
      margin-bottom: 12px;
    }
    .title {
      font-size: 1.1rem;
      font-weight: 600;
    }
    .month-nav {
      display: flex;
      align-items: center;
      gap: 4px;
      flex-wrap: wrap;
    }
    .month-label {
      min-width: 140px;
      text-align: center;
      font-weight: 600;
    }
    button {
      border-radius: 6px;
      border: 1px solid var(--border);
      background: #fff;
      padding: 4px 10px;
      font-size: 0.85rem;
      cursor: pointer;
    }
    button:hover {
      background: var(--accent-soft);
      border-color: var(--accent);
    }
    button.primary {
      background: var(--accent);
      color: #fff;
      border-color: var(--accent);
    }
    button.primary:hover {
      filter: brightness(0.95);
    }

    .calendar {
      border-top: 1px solid var(--border);
      margin-top: 8px;
    }
    .weekdays, .week {
      display: grid;
      grid-template-columns: repeat(7, 1fr);
    }
    .weekdays div {
      padding: 6px 4px;
      text-align: center;
      font-size: 0.75rem;
      color: #666;
      border-bottom: 1px solid var(--border);
    }
    .day {
      min-height: 70px;
      border-bottom: 1px solid var(--border);
      border-right: 1px solid var(--border);
      padding: 4px;
      display: flex;
      flex-direction: column;
      gap: 2px;
      font-size: 0.8rem;
      background: #fff;
    }
    .day:nth-child(7n) {
      border-right: none;
    }
    .day-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 4px;
    }
    .day-number {
      font-weight: 600;
      font-size: 0.8rem;
    }
    .day.out-month .day-number {
      color: #bbb;
      font-weight: 400;
    }
    .today {
      background: var(--today);
    }
    .add-btn {
      border: none;
      background: transparent;
      color: #999;
      font-size: 0.9rem;
      padding: 0 2px;
    }
    .add-btn:hover {
      color: var(--accent);
      background: transparent;
    }
    .events {
      margin-top: 2px;
      display: flex;
      flex-direction: column;
      gap: 2px;
      max-height: 56px;
      overflow: hidden;
    }
    .event {
      font-size: 0.7rem;
      padding: 2px 4px;
      border-radius: 4px;
      background: var(--accent-soft);
      color: #333;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      cursor: pointer;
    }

    /* モーダル */
    .modal-backdrop {
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.35);
      display: none;
      align-items: center;
      justify-content: center;
      z-index: 10;
    }
    .modal {
      background: #fff;
      border-radius: 10px;
      padding: 16px;
      width: min(420px, 92vw);
      max-height: 80vh;
      display: flex;
      flex-direction: column;
      gap: 10px;
    }
    .modal-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 8px;
    }
    .modal-title {
      font-size: 0.95rem;
      font-weight: 600;
    }
    .modal-body {
      display: flex;
      flex-direction: column;
      gap: 6px;
      font-size: 0.85rem;
    }
    label {
      font-size: 0.8rem;
      color: #555;
    }
    textarea {
      width: 100%;
      min-height: 80px;
      resize: vertical;
      font-family: inherit;
      font-size: 0.85rem;
      padding: 6px;
      border-radius: 6px;
      border: 1px solid var(--border);
    }
    textarea:focus {
      outline: none;
      border-color: var(--accent);
      box-shadow: 0 0 0 1px var(--accent-soft);
    }
    .modal-footer {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 8px;
      margin-top: 4px;
    }
    .modal-footer-left {
      display: flex;
      gap: 6px;
      flex-wrap: wrap;
    }
    .small {
      font-size: 0.75rem;
      color: #777;
    }
    .event-list {
      border: 1px solid var(--border);
      border-radius: 6px;
      padding: 6px;
      max-height: 120px;
      overflow: auto;
      display: flex;
      flex-direction: column;
      gap: 4px;
    }
    .event-row {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 6px;
      font-size: 0.8rem;
    }
    .event-row span {
      flex: 1;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }
    .event-row button {
      font-size: 0.7rem;
      padding: 2px 6px;
    }

    @media (max-width: 600px) {
      .day {
        min-height: 60px;
      }
      .events {
        max-height: 44px;
      }
    }
  </style>
</head>
<body>
  <div class="app">
    <header>
      <div class="title">マイスケジュールカレンダー</div>
      <div class="month-nav">
        <button id="prevMonthBtn">◀</button>
        <div class="month-label" id="monthLabel"></div>
        <button id="nextMonthBtn">▶</button>
        <button id="todayBtn">今日</button>
      </div>
    </header>

    <section class="calendar">
      <div class="weekdays">
        <div>日</div><div>月</div><div>火</div><div>水</div><div>木</div><div>金</div><div>土</div>
      </div>
      <div id="calendarBody"></div>
    </section>
  </div>

  <!-- モーダル -->
  <div class="modal-backdrop" id="modalBackdrop">
    <div class="modal">
      <div class="modal-header">
        <div class="modal-title" id="modalTitle"></div>
        <button id="closeModalBtn">✕</button>
      </div>
      <div class="modal-body">
        <div>
          <label for="eventText">予定（1日分・自由記述）</label>
          <textarea id="eventText" placeholder="例：19:00〜20:00 タンゴレッスン"></textarea>
        </div>
        <div>
          <div class="small">この日の既存の予定</div>
          <div class="event-list" id="eventList"></div>
        </div>
      </div>
      <div class="modal-footer">
        <div class="modal-footer-left">
          <button id="addEventBtn" class="primary">追加</button>
          <button id="clearDayBtn">この日の予定を全削除</button>
        </div>
        <div class="small" id="modalDateLabel"></div>
      </div>
    </div>
  </div>

  <script>
    // ====== 状態 ======
    const STORAGE_KEY = "yuki_schedule_calendar_v1";
    let events = loadEvents(); // { "YYYY-MM-DD": ["text", ...], ... }
    let current = new Date();

    // ====== ユーティリティ ======
    function pad(n) {
      return n.toString().padStart(2, "0");
    }
    function toDateKey(date) {
      const y = date.getFullYear();
      const m = pad(date.getMonth() + 1);
      const d = pad(date.getDate());
      return `${y}-${m}-${d}`;
    }
    function fromYMD(y, m, d) {
      return new Date(y, m - 1, d);
    }
    function loadEvents() {
      try {
        const raw = localStorage.getItem(STORAGE_KEY);
        if (!raw) return {};
        const obj = JSON.parse(raw);
        if (typeof obj === "object" && obj) return obj;
      } catch (e) {}
      return {};
    }
    function saveEvents() {
      localStorage.setItem(STORAGE_KEY, JSON.stringify(events));
    }

    // ====== カレンダー描画 ======
    const monthLabel = document.getElementById("monthLabel");
    const calendarBody = document.getElementById("calendarBody");

    function renderCalendar() {
      const year = current.getFullYear();
      const month = current.getMonth(); // 0-11
      monthLabel.textContent = `${year}年 ${month + 1}月`;

      calendarBody.innerHTML = "";

      const first = new Date(year, month, 1);
      const firstWeekday = first.getDay(); // 0:Sun
      const daysInMonth = new Date(year, month + 1, 0).getDate();

      // 前月の末尾を埋める
      const prevMonthDays = new Date(year, month, 0).getDate();
      const cells = [];

      for (let i = 0; i < firstWeekday; i++) {
        const day = prevMonthDays - firstWeekday + 1 + i;
        cells.push({ day, inMonth: false, date: new Date(year, month - 1, day) });
      }
      for (let d = 1; d <= daysInMonth; d++) {
        cells.push({ day: d, inMonth: true, date: new Date(year, month, d) });
      }
      // 次月の先頭を埋める
      while (cells.length % 7 !== 0) {
        const nextDay = cells.length - (firstWeekday + daysInMonth) + 1;
        cells.push({ day: nextDay, inMonth: false, date: new Date(year, month + 1, nextDay) });
      }

      const todayKey = toDateKey(new Date());

      for (let i = 0; i < cells.length; i++) {
        if (i % 7 === 0) {
          const weekRow = document.createElement("div");
          weekRow.className = "week";
          calendarBody.appendChild(weekRow);
        }
        const cell = cells[i];
        const weekRow = calendarBody.lastElementChild;

        const dayDiv = document.createElement("div");
        dayDiv.className = "day";
        if (!cell.inMonth) dayDiv.classList.add("out-month");
        const key = toDateKey(cell.date);
        if (key === todayKey) dayDiv.classList.add("today");

        const header = document.createElement("div");
        header.className = "day-header";

        const num = document.createElement("div");
        num.className = "day-number";
        num.textContent = cell.day;

        const addBtn = document.createElement("button");
        addBtn.className = "add-btn";
        addBtn.textContent = "+";
        addBtn.title = "予定を追加";
        addBtn.addEventListener("click", (e) => {
          e.stopPropagation();
          openModal(key, cell.date);
        });

        header.appendChild(num);
        header.appendChild(addBtn);

        const eventsDiv = document.createElement("div");
        eventsDiv.className = "events";
        const list = events[key] || [];
        list.forEach((txt, idx) => {
          const ev = document.createElement("div");
          ev.className = "event";
          ev.textContent = txt;
          ev.title = txt;
          ev.addEventListener("click", (e) => {
            e.stopPropagation();
            openModal(key, cell.date, idx);
          });
          eventsDiv.appendChild(ev);
        });

        dayDiv.appendChild(header);
        dayDiv.appendChild(eventsDiv);

        dayDiv.addEventListener("click", () => openModal(key, cell.date));
        weekRow.appendChild(dayDiv);
      }
    }

    // ====== モーダル ======
    const modalBackdrop = document.getElementById("modalBackdrop");
    const modalTitle = document.getElementById("modalTitle");
    const modalDateLabel = document.getElementById("modalDateLabel");
    const eventText = document.getElementById("eventText");
    const eventList = document.getElementById("eventList");
    const closeModalBtn = document.getElementById("closeModalBtn");
    const addEventBtn = document.getElementById("addEventBtn");
    const clearDayBtn = document.getElementById("clearDayBtn");

    let modalDateKey = null;

    function openModal(key, date, focusIndex = null) {
      modalDateKey = key;
      const y = date.getFullYear();
      const m = date.getMonth() + 1;
      const d = date.getDate();
      modalTitle.textContent = `${y}年${m}月${d}日の予定`;
      modalDateLabel.textContent = key;
      eventText.value = "";
      renderEventList(key);
      modalBackdrop.style.display = "flex";
      if (focusIndex != null && events[key] && events[key][focusIndex]) {
        eventText.value = events[key][focusIndex];
      }
      eventText.focus();
    }

    function closeModal() {
      modalBackdrop.style.display = "none";
      modalDateKey = null;
    }

    function renderEventList(key) {
      eventList.innerHTML = "";
      const list = events[key] || [];
      if (list.length === 0) {
        const empty = document.createElement("div");
        empty.className = "small";
        empty.textContent = "この日の予定はまだありません。";
        eventList.appendChild(empty);
        return;
      }
      list.forEach((txt, idx) => {
        const row = document.createElement("div");
        row.className = "event-row";
        const span = document.createElement("span");
        span.textContent = txt;
        span.title = txt;

        const editBtn = document.createElement("button");
        editBtn.textContent = "編集";
        editBtn.addEventListener("click", () => {
          eventText.value = txt;
          eventText.focus();
        });

        const delBtn = document.createElement("button");
        delBtn.textContent = "削除";
        delBtn.addEventListener("click", () => {
          const arr = events[key] || [];
          arr.splice(idx, 1);
          if (arr.length === 0) {
            delete events[key];
          } else {
            events[key] = arr;
          }
          saveEvents();
          renderEventList(key);
          renderCalendar();
        });

        row.appendChild(span);
        row.appendChild(editBtn);
        row.appendChild(delBtn);
        eventList.appendChild(row);
      });
    }

    addEventBtn.addEventListener("click", () => {
      if (!modalDateKey) return;
      const text = eventText.value.trim();
      if (!text) return;
      const list = events[modalDateKey] || [];
      list.push(text);
      events[modalDateKey] = list;
      saveEvents();
      eventText.value = "";
      renderEventList(modalDateKey);
      renderCalendar();
    });

    clearDayBtn.addEventListener("click", () => {
      if (!modalDateKey) return;
      if (!events[modalDateKey]) return;
      if (!confirm("この日の予定をすべて削除しますか？")) return;
      delete events[modalDateKey];
      saveEvents();
      renderEventList(modalDateKey);
      renderCalendar();
    });

    closeModalBtn.addEventListener("click", closeModal);
    modalBackdrop.addEventListener("click", (e) => {
      if (e.target === modalBackdrop) closeModal();
    });
    document.addEventListener("keydown", (e) => {
      if (e.key === "Escape") closeModal();
    });

    // ====== ナビゲーション ======
    document.getElementById("prevMonthBtn").addEventListener("click", () => {
      current.setMonth(current.getMonth() - 1);
      renderCalendar();
    });
    document.getElementById("nextMonthBtn").addEventListener("click", () => {
      current.setMonth(current.getMonth() + 1);
      renderCalendar();
    });
    document.getElementById("todayBtn").addEventListener("click", () => {
      current = new Date();
      renderCalendar();
    });

    // 初期描画
    renderCalendar();
  </script>
</body>
</html>
