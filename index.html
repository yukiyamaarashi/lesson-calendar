<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>レッスンスケジュール（同期版）</title>

<style>
  body { font-family: sans-serif; margin: 20px; }
  input, button { padding: 8px; margin: 5px 0; }
  table { border-collapse: collapse; width: 100%; margin-top: 20px; }
  th, td { border: 1px solid #ccc; padding: 8px; vertical-align: top; }
  .lesson { background: #eef; margin: 4px 0; padding: 4px; border-radius: 4px; }
</style>
</head>
<body>

<h1>レッスンスケジュール（Gist同期）</h1>

<div>
  <h3>レッスン追加</h3>
  <input type="date" id="date">
  <input type="time" id="time">
  <input type="text" id="title" placeholder="例：タンゴ個人レッスン">
  <button onclick="addLesson()">追加</button>
</div>

<div id="calendar"></div>

<script>
// ===============================
// ★ 祐紀が置き換える場所（2か所）
// ===============================
const GIST_ID = "594cb64af43de12fa24d5a196680eaa5";   // ← Gist ID を入れる
const TOKEN   = "YOUR_TOKEN_HERE";     // ← Classic Token を入れる

// ===============================
// Gist からデータを取得
// ===============================
async function loadLessons() {
  //const res = await fetch(`https://api.github.com/gists/${GIST_ID}`, {
  const res = await fetch(`https://lesson-worker.yuki425-yama.workers.dev`, {
    headers: { Authorization: `Bearer ${TOKEN}` }
  });
  const data = await res.json();
  return JSON.parse(data.files["lessons.json"].content);
}

// ===============================
// Gist にデータを書き込む
// ===============================
async function saveLessons(lessons) {
 // await fetch(`https://api.github.com/gists/${GIST_ID}`, {
await fetch(`https://lesson-worker.yuki425-yama.workers.dev`, {
    method: "PATCH",
    headers: {
      Authorization: `Bearer ${TOKEN}`,
      "Content-Type": "application/json"
    },
    body: JSON.stringify({
      files: {
        "lessons.json": {
          content: JSON.stringify(lessons, null, 2)
        }
      }
    })
  });
}

// ===============================
// カレンダー描画
// ===============================
async function renderCalendar() {
  const lessons = await loadLessons();

  const now = new Date();
  const year = now.getFullYear();
  const month = now.getMonth();

  const firstDay = new Date(year, month, 1).getDay();
  const lastDate = new Date(year, month + 1, 0).getDate();

  let html = `<h2>${year}年 ${month + 1}月</h2>`;
  html += "<table><tr><th>日</th><th>月</th><th>火</th><th>水</th><th>木</th><th>金</th><th>土</th></tr><tr>";

  for (let i = 0; i < firstDay; i++) html += "<td></td>";

  for (let day = 1; day <= lastDate; day++) {
    const dateStr = `${year}-${String(month + 1).padStart(2, "0")}-${String(day).padStart(2, "0")}`;
    html += `<td><strong>${day}</strong>`;

    lessons
      .filter(l => l.date === dateStr)
      .forEach(l => {
        html += `<div class="lesson">${l.time}<br>${l.title}</div>`;
      });

    html += "</td>";

    if ((day + firstDay) % 7 === 0) html += "</tr><tr>";
  }

  html += "</tr></table>";
  document.getElementById("calendar").innerHTML = html;
}

// ===============================
// レッスン追加
// ===============================
async function addLesson() {
  const date = document.getElementById("date").value;
  const time = document.getElementById("time").value;
  const title = document.getElementById("title").value;

  if (!date || !time || !title) {
    alert("すべて入力してね");
    return;
  }

  const lessons = await loadLessons();
  lessons.push({ date, time, title });

  await saveLessons(lessons);
  renderCalendar();
}

// 初期表示
renderCalendar();
</script>

</body>
</html>
