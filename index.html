<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>レッスンスケジュール</title>
<style>
  body { font-family: sans-serif; margin: 10px; }
  h1 { font-size: 20px; margin-bottom: 10px; }
  table { border-collapse: collapse; width: 100%; font-size: 12px; }
  th, td {
    border: 1px solid #ccc;
    padding: 6px;
    text-align: center;
    height: 60px;
    vertical-align: top;
  }
  .lesson {
    background: #dff0ff;
    border-radius: 6px;
    padding: 3px;
    margin-top: 3px;
    font-size: 11px;
  }
  #form-area {
    margin-bottom: 15px;
    padding: 10px;
    border: 1px solid #aaa;
    border-radius: 6px;
    font-size: 14px;
  }
  input, button {
    font-size: 14px;
    padding: 6px;
    width: 100%;
    margin-top: 5px;
  }
  button {
    background: #007bff;
    color: white;
    border: none;
    border-radius: 4px;
  }
</style>
</head>
<body>

<h1>レッスンスケジュール</h1>

<div id="form-area">
  <strong>レッスン追加</strong><br>
  <input type="date" id="date">
  <input type="time" id="time">
  <input type="text" id="title" placeholder="例：タンゴ個人レッスン">
  <button onclick="addLesson()">追加</button>
</div>

<div id="calendar"></div>

<script>
  const calendarDiv = document.getElementById("calendar");
  const lessons = JSON.parse(localStorage.getItem("lessons") || "[]");

  function renderCalendar() {
    const now = new Date();
    const year = now.getFullYear();
    const month = now.getMonth();

    const firstDay = new Date(year, month, 1).getDay();
    const lastDate = new Date(year, month + 1, 0).getDate();

    let html = `<h2>${year}年 ${month + 1}月</h2>`;
    html += "<table><tr><th>日</th><th>月</th><th>火</th><th>水</th><th>木</th><th>金</th><th>土</th></tr><tr>";

    for (let i = 0; i < firstDay; i++) html += "<td></td>";

    for (let day = 1; day <= lastDate; day++) {
      const dateStr = `${year}-${String(month + 1).padStart(2, "0")}-${String(day).padStart(2, "0")}`;
      html += `<td><strong>${day}</strong>`;

      lessons
        .filter(l => l.date === dateStr)
        .forEach(l => {
          html += `<div class="lesson">${l.time}<br>${l.title}</div>`;
        });

      html += "</td>";

      if ((day + firstDay) % 7 === 0) html += "</tr><tr>";
    }

    html += "</tr></table>";
    calendarDiv.innerHTML = html;
  }

  function addLesson() {
    const date = document.getElementById("date").value;
    const time = document.getElementById("time").value;
    const title = document.getElementById("title").value;

    if (!date || !time || !title) return alert("すべて入力してね");

    lessons.push({ date, time, title });
    localStorage.setItem("lessons", JSON.stringify(lessons));
    renderCalendar();
  }

  renderCalendar();
</script>

</body>
</html>
